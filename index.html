<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>题库学习助手</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #F6F1E8;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            text-align: center;
            max-width: 600px;
        }
        h1 {
            font-size: 32px;
            color: #2A2723;
            margin-bottom: 20px;
        }
        .icon {
            font-size: 80px;
            margin-bottom: 30px;
        }
        p {
            font-size: 18px;
            color: #8A8A80;
            margin-bottom: 30px;
            line-height: 1.6;
        }
        .btn {
            display: inline-block;
            padding: 15px 40px;
            background: #C8853F;
            color: #F6F1E8;
            text-decoration: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: 600;
            transition: all 0.2s;
        }
        .btn:hover {
            background: #A86B2C;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(200, 133, 63, 0.3);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">📚</div>
        <h1>题库学习助手</h1>
        <p>智能题库学习工具<br>支持多题库管理、错题集、弱项加强</p>
        <a href="./题库学习.html" class="btn">开始学习</a>
    </div>
</body>
</html>
